<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="description" content="Trade Wind Run is a mobile-friendly wind surfing adventure game.">
    <title>Trade Wind Run</title>
    <style>
      :root {
        --ink: #07191d;
        --water: #0f6170;
        --sky: #9bd6d6;
        --foam: #f5f0dc;
        --gold: #e7b75c;
        --coral: #de694c;
        --line: rgba(245, 240, 220, 0.2);
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--ink);
        color: var(--foam);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overscroll-behavior: none;
      }
      body { position: fixed; inset: 0; }
      main {
        position: relative;
        width: 100vw;
        height: 100svh;
        min-height: 500px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(155, 214, 214, 0.42), rgba(15, 97, 112, 0.18) 38%, rgba(7, 25, 29, 0.86)),
          var(--water);
        touch-action: none;
      }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }
      .hud {
        position: absolute;
        z-index: 2;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        pointer-events: none;
      }
      .eyebrow {
        margin: 0 0 5px;
        color: rgba(245, 240, 220, 0.72);
        font-size: 10px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        max-width: 230px;
        font-size: clamp(31px, 9vw, 48px);
        line-height: 0.9;
        letter-spacing: 0;
      }
      .meters {
        display: grid;
        grid-template-columns: repeat(2, minmax(66px, auto));
        gap: 6px;
      }
      .meter {
        min-width: 66px;
        padding: 8px 9px;
        border: 1px solid var(--line);
        background: rgba(7, 25, 29, 0.62);
        text-align: right;
        backdrop-filter: blur(12px);
      }
      .meter span {
        display: block;
        color: rgba(245, 240, 220, 0.66);
        font-size: 9px;
        font-weight: 850;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .meter strong {
        display: block;
        margin-top: 2px;
        font-variant-numeric: tabular-nums;
        font-size: 20px;
        line-height: 1;
      }
      .message {
        position: absolute;
        z-index: 3;
        left: 16px;
        right: 16px;
        bottom: max(18px, env(safe-area-inset-bottom));
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(7, 25, 29, 0.82);
        backdrop-filter: blur(16px);
      }
      .message[hidden] { display: none; }
      .message p { margin: 0; color: rgba(245, 240, 220, 0.8); font-size: 14px; line-height: 1.42; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      button, a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 10px 13px;
        border: 1px solid rgba(245, 240, 220, 0.32);
        border-radius: 3px;
        background: var(--gold);
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        font-weight: 850;
        text-decoration: none;
      }
      a { background: transparent; color: var(--foam); }
      .sound {
        position: absolute;
        z-index: 4;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
        min-height: 38px;
        padding: 8px 11px;
        background: rgba(7, 25, 29, 0.62);
        color: var(--foam);
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="game" aria-label="Trade Wind Run playfield"></canvas>
      <section class="hud" aria-label="Game status">
        <div>
          <p class="eyebrow">Wind Surfing Adventure</p>
          <h1>Trade Wind Run</h1>
        </div>
        <div class="meters">
          <div class="meter"><span>Flags</span><strong id="flags">0/7</strong></div>
          <div class="meter"><span>Wind</span><strong id="wind">0</strong></div>
          <div class="meter"><span>Board</span><strong id="board">100</strong></div>
          <div class="meter"><span>Run</span><strong id="run">0%</strong></div>
        </div>
      </section>
      <section class="message" id="message">
        <p><strong>Ride the trade winds.</strong> Drag or use arrows/WASD to carve. Tap or press Space to pump the sail. Collect seven flags, dodge reefs and storm buoys, then cross the finish gate.</p>
        <div class="actions">
          <button id="start" type="button">Start Run</button>
          <a href="../../">Game Lab</a>
        </div>
      </section>
      <button class="sound" id="sound" type="button" aria-pressed="true">Sound On</button>
    </main>
    <script>
      (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const flagsEl = document.getElementById("flags");
        const windEl = document.getElementById("wind");
        const boardEl = document.getElementById("board");
        const runEl = document.getElementById("run");
        const message = document.getElementById("message");
        const startButton = document.getElementById("start");
        const soundButton = document.getElementById("sound");

        const world = { w: 2800, h: 1800 };
        const keys = new Set();
        const state = {
          w: 0, h: 0, dpr: 1, playing: false, muted: false,
          camera: { x: 0, y: 0 },
          pointer: { x: 0, y: 0, active: false },
          rider: { x: 160, y: 900, vx: 0, vy: 0, angle: 0, board: 100, boost: 0 },
          wind: { angle: -0.2, strength: 48 },
          flags: [],
          hazards: [],
          wake: [],
          pings: [],
          finish: { x: 2600, y: 900, open: false },
          time: 0,
          audio: null
        };

        function setupAudio() {
          if (state.muted) return;
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          state.audio ||= new AudioContext();
          if (state.audio.state === "suspended") state.audio.resume();
        }

        function tone(kind) {
          if (state.muted || !state.audio) return;
          const now = state.audio.currentTime;
          const osc = state.audio.createOscillator();
          const gain = state.audio.createGain();
          const map = {
            pump: [180, 300, 0.11, "triangle"],
            flag: [520, 920, 0.2, "sine"],
            hit: [130, 75, 0.18, "sawtooth"],
            gate: [240, 520, 0.34, "triangle"],
            win: [380, 980, 0.55, "sine"]
          }[kind] || [220, 110, 0.12, "sine"];
          osc.type = map[3];
          osc.frequency.setValueAtTime(map[0], now);
          osc.frequency.exponentialRampToValueAtTime(map[1], now + map[2]);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(kind === "hit" ? 0.18 : 0.13, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + map[2]);
          osc.connect(gain);
          gain.connect(state.audio.destination);
          osc.start(now);
          osc.stop(now + map[2] + 0.03);
        }

        function resize() {
          const rect = canvas.parentElement.getBoundingClientRect();
          state.dpr = Math.min(window.devicePixelRatio || 1, 2);
          state.w = Math.floor(rect.width);
          state.h = Math.floor(rect.height);
          canvas.width = Math.floor(state.w * state.dpr);
          canvas.height = Math.floor(state.h * state.dpr);
          canvas.style.width = `${state.w}px`;
          canvas.style.height = `${state.h}px`;
          ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        }

        function reset() {
          setupAudio();
          state.playing = true;
          state.time = 0;
          state.rider = { x: 160, y: 900, vx: 0, vy: 0, angle: 0, board: 100, boost: 0 };
          state.wind = { angle: -0.2, strength: 48 };
          state.wake = [];
          state.pings = [];
          state.finish.open = false;
          state.flags = [
            { x: 430, y: 690, got: false }, { x: 720, y: 1100, got: false },
            { x: 1040, y: 560, got: false }, { x: 1360, y: 1260, got: false },
            { x: 1700, y: 770, got: false }, { x: 2050, y: 1190, got: false },
            { x: 2360, y: 720, got: false }
          ];
          state.hazards = [
            { x: 610, y: 900, r: 42, type: "reef" }, { x: 980, y: 870, r: 50, type: "buoy" },
            { x: 1220, y: 1190, r: 48, type: "reef" }, { x: 1510, y: 690, r: 52, type: "buoy" },
            { x: 1860, y: 980, r: 58, type: "reef" }, { x: 2240, y: 980, r: 54, type: "storm" }
          ];
          message.hidden = true;
          updateHud();
          tone("gate");
        }

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
        function screenX(x) { return x - state.camera.x; }
        function screenY(y) { return y - state.camera.y; }
        function flagCount() { return state.flags.filter((f) => f.got).length; }

        function updateHud() {
          flagsEl.textContent = `${flagCount()}/7`;
          windEl.textContent = String(Math.round(state.wind.strength));
          boardEl.textContent = String(Math.max(0, Math.round(state.rider.board)));
          runEl.textContent = `${Math.round(clamp(state.rider.x / state.finish.x, 0, 1) * 100)}%`;
        }

        function end(text, won = false) {
          state.playing = false;
          message.hidden = false;
          message.querySelector("p").innerHTML = text;
          startButton.textContent = won ? "Run Again" : "Try Again";
          tone(won ? "win" : "hit");
        }

        function pump() {
          if (!state.playing) return;
          state.rider.boost = 0.48;
          state.pings.push({ x: state.rider.x, y: state.rider.y, life: 0.45, color: "#f5f0dc" });
          tone("pump");
        }

        function pointerWorld(event) {
          const rect = canvas.getBoundingClientRect();
          return { x: event.clientX - rect.left + state.camera.x, y: event.clientY - rect.top + state.camera.y };
        }

        function moveRider(dt) {
          const r = state.rider;
          let ax = 0, ay = 0;
          if (keys.has("ArrowLeft") || keys.has("a")) ax -= 1;
          if (keys.has("ArrowRight") || keys.has("d")) ax += 1;
          if (keys.has("ArrowUp") || keys.has("w")) ay -= 1;
          if (keys.has("ArrowDown") || keys.has("s")) ay += 1;
          if (state.pointer.active) {
            const dx = state.pointer.x - r.x;
            const dy = state.pointer.y - r.y;
            const len = Math.hypot(dx, dy);
            if (len > 24) { ax += dx / len; ay += dy / len; }
          }
          const steerLen = Math.hypot(ax, ay) || 1;
          const windPush = state.wind.strength * (r.boost > 0 ? 1.9 : 1);
          r.vx += (Math.cos(state.wind.angle) * windPush + ax / steerLen * 350) * dt;
          r.vy += (Math.sin(state.wind.angle) * windPush + ay / steerLen * 350) * dt;
          r.vx *= 0.965;
          r.vy *= 0.965;
          r.x = clamp(r.x + r.vx * dt, 60, world.w - 60);
          r.y = clamp(r.y + r.vy * dt, 110, world.h - 90);
          r.angle = Math.atan2(r.vy, r.vx || 1);
          r.boost = Math.max(0, r.boost - dt);
          state.camera.x = clamp(r.x - state.w * 0.42, 0, world.w - state.w);
          state.camera.y = clamp(r.y - state.h * 0.52, 0, world.h - state.h);
        }

        function update(dt) {
          state.time += dt;
          state.wind.angle = -0.25 + Math.sin(state.time * 0.45) * 0.35;
          state.wind.strength = 45 + Math.sin(state.time * 0.7) * 18;
          if (!state.playing) return;
          moveRider(dt);
          const r = state.rider;
          if (Math.random() < dt * 18) state.wake.push({ x: r.x - Math.cos(r.angle) * 26, y: r.y - Math.sin(r.angle) * 26, life: 0.55 });
          state.wake.forEach((w) => w.life -= dt);
          state.wake = state.wake.filter((w) => w.life > 0);
          state.pings.forEach((p) => p.life -= dt);
          state.pings = state.pings.filter((p) => p.life > 0);

          for (const flag of state.flags) {
            if (!flag.got && Math.hypot(flag.x - r.x, flag.y - r.y) < 52) {
              flag.got = true;
              state.pings.push({ x: flag.x, y: flag.y, life: 0.7, color: "#e7b75c" });
              tone("flag");
            }
          }
          if (flagCount() === 7 && !state.finish.open) {
            state.finish.open = true;
            state.pings.push({ x: state.finish.x, y: state.finish.y, life: 1, color: "#9bd6d6" });
            tone("gate");
          }
          for (const hazard of state.hazards) {
            const d = Math.hypot(hazard.x - r.x, hazard.y - r.y);
            if (d < hazard.r + 24) {
              r.board -= dt * (hazard.type === "storm" ? 36 : 22);
              const dx = r.x - hazard.x, dy = r.y - hazard.y, len = Math.hypot(dx, dy) || 1;
              r.vx += dx / len * 180 * dt;
              r.vy += dy / len * 180 * dt;
              if (Math.random() < dt * 8) tone("hit");
            }
          }
          if (state.finish.open && Math.hypot(state.finish.x - r.x, state.finish.y - r.y) < 78) {
            end("<strong>Finish gate crossed.</strong> You caught every flag and rode the trade wind home.", true);
          }
          if (r.board <= 0) end("<strong>Board cracked.</strong> The reef line won this run.");
          updateHud();
        }

        function drawWater() {
          const g = ctx.createLinearGradient(0, 0, 0, state.h);
          g.addColorStop(0, "#9bd6d6");
          g.addColorStop(0.28, "#167987");
          g.addColorStop(1, "#07191d");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, state.w, state.h);
          ctx.strokeStyle = "rgba(245,240,220,.18)";
          ctx.lineWidth = 2;
          for (let y = -state.camera.y % 74; y < state.h + 80; y += 74) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.bezierCurveTo(state.w * 0.22, y + 28, state.w * 0.65, y - 22, state.w, y + 10);
            ctx.stroke();
          }
          ctx.strokeStyle = "rgba(245,240,220,.28)";
          for (let x = ((state.time * -state.wind.strength) - state.camera.x) % 180; x < state.w + 200; x += 180) {
            ctx.beginPath();
            ctx.moveTo(x, 74);
            ctx.lineTo(x + 52, 58);
            ctx.lineTo(x + 42, 48);
            ctx.stroke();
          }
        }

        function drawFlags() {
          for (const flag of state.flags) if (!flag.got) {
            const x = screenX(flag.x), y = screenY(flag.y);
            ctx.strokeStyle = "#f5f0dc";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(x, y + 28); ctx.lineTo(x, y - 30); ctx.stroke();
            ctx.fillStyle = "#e7b75c";
            ctx.beginPath(); ctx.moveTo(x, y - 30); ctx.lineTo(x + 34, y - 18); ctx.lineTo(x, y - 6); ctx.closePath(); ctx.fill();
          }
        }

        function drawHazards() {
          for (const h of state.hazards) {
            const x = screenX(h.x), y = screenY(h.y);
            if (h.type === "reef") {
              ctx.fillStyle = "#de694c";
              ctx.beginPath();
              for (let i = 0; i < 7; i += 1) {
                const a = i / 7 * Math.PI * 2;
                const rr = h.r * (i % 2 ? 0.72 : 1);
                ctx.lineTo(x + Math.cos(a) * rr, y + Math.sin(a) * rr);
              }
              ctx.closePath(); ctx.fill();
            } else {
              ctx.fillStyle = h.type === "storm" ? "#07191d" : "#f5f0dc";
              ctx.strokeStyle = h.type === "storm" ? "#de694c" : "#e7b75c";
              ctx.lineWidth = 5;
              ctx.beginPath(); ctx.arc(x, y, h.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
              ctx.fillStyle = "#de694c";
              ctx.fillRect(x - 6, y - h.r - 20, 12, 24);
            }
          }
        }

        function drawFinish() {
          const x = screenX(state.finish.x), y = screenY(state.finish.y);
          ctx.strokeStyle = state.finish.open ? "#9bd6d6" : "rgba(245,240,220,.35)";
          ctx.lineWidth = 8;
          ctx.beginPath(); ctx.moveTo(x, y - 120); ctx.lineTo(x, y + 120); ctx.stroke();
          ctx.fillStyle = state.finish.open ? "#9bd6d6" : "rgba(245,240,220,.35)";
          ctx.fillRect(x - 40, y - 120, 80, 18);
          ctx.fillRect(x - 40, y + 102, 80, 18);
        }

        function drawRider() {
          const r = state.rider;
          const x = screenX(r.x), y = screenY(r.y);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(r.angle);
          ctx.fillStyle = "#f5f0dc";
          ctx.fillRect(-30, -6, 62, 12);
          ctx.fillStyle = "#07191d";
          ctx.fillRect(-8, -10, 18, 20);
          ctx.strokeStyle = r.boost > 0 ? "#e7b75c" : "#9bd6d6";
          ctx.lineWidth = 4;
          ctx.beginPath(); ctx.moveTo(-4, -12); ctx.lineTo(14, -58); ctx.lineTo(44, -8); ctx.closePath(); ctx.stroke();
          ctx.fillStyle = r.boost > 0 ? "rgba(231,183,92,.42)" : "rgba(155,214,214,.36)";
          ctx.beginPath(); ctx.moveTo(14, -58); ctx.lineTo(44, -8); ctx.lineTo(-4, -12); ctx.closePath(); ctx.fill();
          ctx.restore();
        }

        function draw() {
          drawWater();
          drawFinish();
          drawFlags();
          drawHazards();
          ctx.strokeStyle = "rgba(245,240,220,.5)";
          for (const w of state.wake) {
            ctx.globalAlpha = Math.max(0, w.life / 0.55);
            ctx.beginPath(); ctx.arc(screenX(w.x), screenY(w.y), 8 + (1 - w.life) * 22, 0, Math.PI * 2); ctx.stroke();
          }
          ctx.globalAlpha = 1;
          for (const p of state.pings) {
            ctx.strokeStyle = p.color;
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(screenX(p.x), screenY(p.y), 18 + (1 - p.life) * 62, 0, Math.PI * 2); ctx.stroke();
          }
          ctx.globalAlpha = 1;
          drawRider();
        }

        let last = performance.now();
        function frame(now) {
          const dt = Math.min(0.033, (now - last) / 1000);
          last = now;
          update(dt);
          draw();
          requestAnimationFrame(frame);
        }

        canvas.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          setupAudio();
          if (!state.playing) { reset(); return; }
          state.pointer = { ...pointerWorld(event), active: true };
          pump();
        });
        canvas.addEventListener("pointermove", (event) => {
          if (!state.playing) return;
          state.pointer = { ...pointerWorld(event), active: true };
        });
        window.addEventListener("pointerup", () => { state.pointer.active = false; });
        window.addEventListener("keydown", (event) => {
          keys.add(event.key);
          if (event.key === " ") pump();
          if (event.key === "Enter" && !state.playing) reset();
        });
        window.addEventListener("keyup", (event) => keys.delete(event.key));
        startButton.addEventListener("click", reset);
        soundButton.addEventListener("click", () => {
          state.muted = !state.muted;
          soundButton.textContent = state.muted ? "Sound Off" : "Sound On";
          soundButton.setAttribute("aria-pressed", String(!state.muted));
          if (!state.muted) setupAudio();
        });
        window.addEventListener("resize", resize);
        resize();
        updateHud();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
