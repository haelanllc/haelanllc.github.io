<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Clumsy Bird</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: #fffaf0;
      background: #061015;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    .hud {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 58px;
      padding: 10px 12px;
      background: rgba(6, 16, 21, 0.76);
      border-bottom: 1px solid rgba(255, 250, 240, 0.16);
      backdrop-filter: blur(10px);
    }
    .hud strong { display: block; font-size: 14px; }
    .hud span { color: rgba(255, 250, 240, 0.72); font-size: 12px; }
    .hud-actions { display: flex; align-items: center; gap: 8px; }
    .score { min-width: 64px; text-align: right; font-weight: 850; }
    button {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid rgba(255, 208, 138, 0.6);
      border-radius: 8px;
      color: #061015;
      background: #ffd08a;
      font: 800 13px/1 ui-sans-serif, system-ui, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: calc(100vh - 58px);
      margin-top: 58px;
      touch-action: none;
    }
  </style>
</head>
<body data-bonus-game="flappy" data-game-title="Clumsy Bird" data-game-subtitle="Tap, press A, or hold Up to flap through gaps.">
  <div class="hud">
    <div><strong>Clumsy Bird</strong><span id="status">Tap Start</span></div>
    <div class="hud-actions"><button id="start" type="button">Start</button><div class="score">Score <span id="score">0</span></div></div>
  </div>
  <canvas id="game" aria-label="Clumsy Bird game"></canvas>
  <script src="../bonus-mobile-game.js"></script>
  <script src="../mobile-controls.js"></script>
</body>
</html>
